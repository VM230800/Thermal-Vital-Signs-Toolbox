# ─────────────────────────────────────────────────────────────────
# NPZ Thermal Dataset – Configurations
# ─────────────────────────────────────────────────────────────────
#
# Expected directory structure:
#   IRData/
#   ├── 005/
#   │   ├── synchronized_data_0.npz
#   │   ├── synchronized_data_1.npz
#   │   └── ...
#   ├── 006/
#   │   └── ...
#   └── 027/
#       └── ...
#
# Contents of each .npz file:
#   array1: (N, 768, 1024) float32  – Thermal frames in °C
#   array2: (N,) float64            – Timestamps
#   array4: (N,) float64            – Raw pulse signal
#   array5: (N,) float64            – Raw respiration signal
#
# ─────────────────────────────────────────────────────────────────

# Path to .npz directory
root_dir: "/Volumes/home/IRData"

# Subject and task filters
# null = load all available
# List = load only specified entries
subject_id: null        # e.g. ["005", "006"] or null
recording_id: null      # e.g. [0, 1, 5] or null

# Video parameters
# FPS is calculated from the timestamps in array2; this value is only used as a fallback if the calculation fails
fps: 30

# Thermal frame resolution (for documentation only)
frame_width: 1024       # [Pixel]
frame_height: 768       # [Pixel]

# ── Physiology ──
# Raw signals – no precomputed BPM values available.
# The pipeline must apply peak detection to pulse_signal and resp_signal.
signal_type: "raw"      # "raw" = raw signal, "bpm" = precomputed BPM values (as in BP4D+)

# Sampling rate of the physiological signals.
# Since the signals are frame-synchronized within the .npz file,
# the physiological sampling rate corresponds to the video FPS.
physio_fs: null         # assigned from FPS at runtime

# ── Preprocessing ──
# Thermal camera may require a warm-up period until temperature values stabilize.
warmup_seconds: 10
